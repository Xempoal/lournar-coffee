<main class="flex-1 px-container-padding py-12 flex flex-col gap-section-gap pb-safe max-w-md mx-auto w-full">
<!-- Hero Celebration Section -->
<section class="flex flex-col items-center text-center mt-4">
<div class="w-24 h-24 bg-primary-container rounded-full flex items-center justify-center mb-8 shadow-soft border border-ink-primary/5">
<!-- Organic hand-drawn style SVG checkmark -->
<svg class="text-botanical-olive" fill="none" height="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="48">
<path d="M4.5 12.5 C 7 15 8 18 9 20 C 12 13 17 7 21 4"></path>
</svg>
</div>
<h1 class="font-hero-lg text-hero-lg text-ink-primary mb-3">Pedido recibido</h1>
<p class="font-body-base text-body-base text-ink-secondary max-w-[280px]">Estamos preparando tu pedido con amor.</p>
</section>
<!-- Order Information Card -->
<section class="bg-surface-container-low rounded-xl p-6 border border-ink-primary/5 shadow-soft flex justify-between items-center relative overflow-hidden">
<!-- Subtle noise overlay for tactility -->
<div class="absolute inset-0 opacity-[0.03] mix-blend-multiply pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
<div class="flex flex-col gap-1 relative z-10">
<span class="font-micro-label text-micro-label text-ink-secondary uppercase tracking-widest">Nº de Orden</span>
<span class="font-product-title text-product-title text-ink-primary">L-2026-0142</span>
</div>
<div class="flex flex-col gap-1 text-right relative z-10">
<span class="font-micro-label text-micro-label text-ink-secondary uppercase tracking-widest">Preparación</span>
<span class="font-price-display text-price-display text-accent-espresso">14 min</span>
</div>
</section>
<!-- Vertical Timeline -->
<section class="px-2 mt-4">
<!-- Step 1: Done -->
<div class="flex gap-6 min-h-[80px]">
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full bg-botanical-olive shadow-soft flex-shrink-0 relative mt-1">
<!-- Inner dot for completed -->
<div class="absolute inset-0 m-auto w-1.5 h-1.5 bg-surface rounded-full"></div>
</div>
<div class="w-px h-full bg-botanical-olive mt-2 mb-2 opacity-30"></div>
</div>
<div class="flex flex-col pb-8">
<span class="font-product-title text-product-title text-ink-primary mb-1">Confirmado</span>
<span class="font-body-base text-body-base text-ink-secondary text-sm">Tu orden ha sido recibida en el local.</span>
</div>
</div>
<!-- Step 2: Active -->
<div class="flex gap-6 min-h-[80px]">
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full border-2 border-accent-espresso bg-surface flex-shrink-0 relative mt-1">
<!-- Active indicator -->
<div class="absolute inset-0 m-auto w-1.5 h-1.5 bg-accent-espresso rounded-full"></div>
</div>
<div class="w-px h-full bg-outline-variant mt-2 mb-2 opacity-50"></div>
</div>
<div class="flex flex-col pb-8">
<span class="font-product-title text-product-title text-accent-espresso mb-1">En preparación</span>
<span class="font-body-base text-body-base text-ink-secondary text-sm">Moliendo los granos para ti.</span>
</div>
</div>
<!-- Step 3: Pending -->
<div class="flex gap-6 min-h-[80px]">
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full border border-outline-variant bg-transparent flex-shrink-0 mt-1"></div>
<div class="w-px h-full bg-outline-variant mt-2 mb-2 opacity-50"></div>
</div>
<div class="flex flex-col pb-8 opacity-50">
<span class="font-product-title text-product-title text-ink-primary mb-1">En camino</span>
<span class="font-body-base text-body-base text-ink-secondary text-sm">Pronto saldrá hacia tu dirección.</span>
</div>
</div>
<!-- Step 4: Pending Last -->
<div class="flex gap-6">
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full border border-outline-variant bg-transparent flex-shrink-0 mt-1"></div>
</div>
<div class="flex flex-col opacity-50">
<span class="font-product-title text-product-title text-ink-primary mb-1">Entregado</span>
</div>
</div>
</section>
<!-- Fixed Bottom Actions -->
<section class="mt-auto pt-8 flex flex-col gap-4">
<button class="w-full h-[56px] bg-ink-primary text-on-primary rounded-lg flex items-center justify-center font-micro-label text-micro-label uppercase tracking-widest transition-transform active:scale-95 shadow-deep">
                Volver al inicio
            </button>
<button class="w-full h-[56px] bg-surface-container-low border border-ink-primary/10 text-ink-primary rounded-lg flex items-center justify-center font-micro-label text-micro-label uppercase tracking-widest gap-2 transition-colors hover:bg-surface-container active:scale-95 shadow-soft">
<span class="material-symbols-outlined text-[18px]">share</span>
                Compartir por WhatsApp
            </button>
</section>
